pipeline:
  name: default_rag_pipeline
  steps:
    - indexing
    - pre_retrieval
    - retrieval
    - post_retrieval
    - generation
    - evaluation

embeddings:
  provider: openrouter
  model: perplexity/pplx-embed-v1-0.6b

indexing:
  document_processing:
    # strategy可以选:
    # - default: 普通固定长度切块，使用 DocumentProcessor
    # - proposition: 先做基础切块，再用 LLM 拆成命题级小块，使用 PropositionProcessor
    strategy: proposition
    chunk_size: 1000
    chunk_overlap: 200
    proposition:
      model: nvidia/nemotron-3-super-120b-a12b:free
      temperature: 0.0
      max_tokens: 512
      max_retries: 2
      retry_delay_seconds: 2.0

generation:
  provider: openrouter
  model: z-ai/glm-5.1
  temperature: 0.6
  max_tokens:
  max_retries: 2
  retry_delay_seconds: 2.0

pre_retrieval:
  enabled: true
  # strategy可以选:
  # - rewrite: 把原始问题改写成更适合检索的查询
  # - step_back: 把原始问题改写成更宽泛、更偏背景知识的查询
  # - hyde: 先生成一段假设性回答文档，再用这段文档去做向量检索
  strategy: rewrite
  provider: openrouter
  model: z-ai/glm-5.1
  temperature: 0.0
  max_tokens: 256
  max_retries: 2
  retry_delay_seconds: 2.0
  # 只在 strategy=hyde 时使用，用来提示假设文档的大致长度
  hyde_target_char_length: 800
