pipeline:
  name: default_rag_pipeline
  steps:
    - indexing
    - pre_retrieval
    - retrieval
    - post_retrieval
    - generation
    - evaluation

indexing:
  document_processing:
    # strategy可以选default | proposition
    strategy: proposition
    chunk_size: 1000
    chunk_overlap: 200
    proposition:
      model: nvidia/nemotron-3-super-120b-a12b:free
      temperature: 0.0
      max_tokens: 512
      max_retries: 2
      retry_delay_seconds: 2.0

generation:
  # zhipu example:
  # provider: zhipu
  # model: glm-4.7
  # temperature: 0.6
  # max_tokens:

  # OpenRouter example:
  provider: openrouter
  # model: google/gemma-4-26b-a4b-it:free
  model: nvidia/nemotron-3-super-120b-a12b:free
